name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (latest=current, v1-lts=angular19, v2-lts=angular20, v3-lts=angular21)'
        required: false
        default: 'v1-lts'
        type: choice
        options:
          - v1-lts

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for pushing tags

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test

      - run: npm publish ./dist --provenance --access public --tag ${{ inputs.tag }}

      - name: Extract version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./src/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.version.outputs.VERSION }} -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin v${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
