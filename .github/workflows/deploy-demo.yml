name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main, demo_deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci
      - run: npm run pack
      - run: rm -f demo/package-lock.json
      - run: npm install --prefix demo
      - run: npm run build --prefix demo -- --base-href /mat-password-meter/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'demo/dist/demo/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
